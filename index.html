<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EKSN — École de Karaté Shindokai Nord</title>
<meta name="description" content="EKSN — École de Karaté Shindokai Nord. Karaté-Jutsu FFKDA. Le triathlon des arts martiaux : karaté contact, boxe, soumission au sol. Cours enfants, ados, adultes. Essai gratuit.">

<meta property="og:url" content="https://site-shindokai.vercel.app/">
<meta property="og:title" content="EKSN — École de Karaté Shindokai Nord">
<meta property="og:description" content="EKSN — École de Karaté Shindokai Nord. Karaté-Jutsu FFKDA. Karaté contact, boxe, soumission au sol.">
<meta property="og:image" content="https://site-shindokai.vercel.app/shinodkai.png">
<meta name="twitter:card" content="summary">
<meta name="twitter:title" content="EKSN — École de Karaté Shindokai Nord">
<meta name="twitter:description" content="EKSN — École de Karaté Shindokai Nord. Karaté-Jutsu FFKDA.">

<link rel="icon" href="shinodkai.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Oswald:wght@400;500;600&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<style>
  html, body { height: 100%; overflow: hidden; }
  #nav-placeholder { position: fixed; top: 0; left: 0; right: 0; z-index: 100; }
  .hero { height: 100vh; min-height: unset; }
</style>
</head>
<body>

<div id="nav-placeholder"></div>

<main>

<!-- ============ HERO ============ -->
<section class="hero" id="home">
  <div class="hero__glow" id="heroGlow"></div>
  <img class="hero__bg-logo" src="shinodkai.png" alt="" aria-hidden="true">
  <img class="hero__kanji" src="img/kanji-shindokai.png" alt="" aria-hidden="true">
  <div class="wrap">
    <div class="hero__content">
      <span class="eyebrow-text hero__eyebrow" id="heroEyebrow">Karaté-Jutsu FFKDA · Nord (59)</span>
      <h1 class="hero__title" id="heroTitle">
        <span class="line"><span>Respect.</span></span>
        <span class="line"><span>Honneur.</span></span>
        <span class="line"><span>Discipline.</span></span>
      </h1>
      <p class="hero__sub" id="heroSub"></p>
      <div class="hero__cta">
        <a href="tarifs.html" class="btn btn--primary">Essai gratuit</a>
        <a href="cours.html" class="btn btn--ghost">Voir les cours</a>
      </div>
    </div>
  </div>
</section>

</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="js/data.js"></script>
<script src="js/render.js"></script>
<script>
initData().then(() => {
  pageInit('index');

  const club = getSection('club');

  // Hero textes
  const heroEyebrow = document.getElementById('heroEyebrow');
  if (heroEyebrow && club.heroEyebrow) heroEyebrow.textContent = club.heroEyebrow;

  const heroTitle = document.getElementById('heroTitle');
  if (heroTitle && club.heroTitle) {
    const lines = heroTitle.querySelectorAll('.line span');
    club.heroTitle.forEach((txt, i) => { if (lines[i]) lines[i].textContent = txt; });
  }

  document.getElementById('heroSub').textContent = club.heroSub;

  initHeroGlow('heroGlow', 'home');
});
</script>
</body>
</html>
