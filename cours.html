<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cours & planning — EKSN</title>
<meta name="description" content="Cours de karaté pour enfants, ados et adultes. Planning complet des séances EKSN.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://site-shindokai.vercel.app/cours.html">
<meta property="og:title" content="Cours de karaté — EKSN">
<meta property="og:description" content="Cours de karaté pour enfants, ados et adultes. Planning complet des séances EKSN.">
<meta property="og:image" content="https://site-shindokai.vercel.app/shinodkai.png">
<meta name="twitter:card" content="summary">
<meta name="twitter:title" content="Cours de karaté — EKSN">
<meta name="twitter:description" content="Cours de karaté pour enfants, ados et adultes. Planning complet des séances EKSN.">
<meta name="twitter:image" content="https://site-shindokai.vercel.app/shinodkai.png">
<link rel="icon" href="shinodkai.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Oswald:wght@400;500;600&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="nav-placeholder"></div>

<main>

<section class="hero-mini">
  <div class="hero-mini__bg"></div>
  <img class="hero-mini__logo-bg" src="shinodkai.png" alt="" aria-hidden="true">
  <svg class="hero-mini__strike" viewBox="0 0 400 1000" preserveAspectRatio="none" fill="none">
    <path d="M380 0 L20 1000" stroke="#e0241b" stroke-width="2" opacity="0.4"/>
  </svg>
  <div class="wrap">
    <div class="hero-mini__content">
      <span class="eyebrow-text hero-mini__eyebrow" id="co-hero-eyebrow">Les cours</span>
      <h1 class="hero-mini__title">
        <span class="line" id="co-hero-l1"><span>Un programme</span></span>
        <span class="line" id="co-hero-l2"><span>pour chaque âge.</span></span>
      </h1>
    </div>
  </div>
</section>

<!-- ============ PLANNINGS PAR DOJO ============ -->
<section class="section section--alt">
  <div class="wrap">
    <div class="section__head reveal">
      <span class="eyebrow-text">Plannings</span>
      <h2 class="section__title">Horaires par<br>dojo.</h2>
    </div>
    <div class="dojos-tabs reveal" id="planningTabs"></div>
    <div id="planningPanels"></div>
  </div>
</section>

<!-- ============ CTA ============ -->
<section class="cta-band">
  <div class="wrap">
    <h2 class="cta-band__title reveal" id="co-cta-titre">Votre premier cours est offert.</h2>
    <p class="cta-band__sub reveal" id="co-cta-sub">Aucun engagement, aucun équipement requis. Venez simplement essayer.</p>
    <div class="cta-band__btns reveal">
      <a href="tarifs.html" class="btn btn--primary">Voir les tarifs</a>
      <a href="dojos.html" class="btn btn--ghost">Trouver un dojo</a>
    </div>
  </div>
</section>

</main>

<div id="footer-placeholder"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="js/data.js"></script>
<script src="js/render.js"></script>
<script>
initData().then(() => {
pageInit('cours');
const courses = getSection('courses');

// Cards cours
const coursGrid = document.getElementById('coursGrid');
courses.forEach(c => {
  const div = document.createElement('div');
  div.className = 'cours-card reveal';
  div.innerHTML = `
    <div class="cours-card__belt" style="background:${esc(c.belt)}"></div>
    <div class="cours-card__age">${esc(c.age)}</div>
    <div class="cours-card__name">${esc(c.name)}</div>
    <div class="cours-card__level">${esc(c.level)}</div>
    <div class="cours-card__time"><span>${esc(c.days)}</span><span>${esc(c.time)}</span></div>`;
  coursGrid.appendChild(div);
});

// Plannings par dojo
const plannings = getSection('plannings') || [];
const planningTabs = document.getElementById('planningTabs');
const planningPanels = document.getElementById('planningPanels');

plannings.forEach((p, i) => {
  // Onglet
  const btn = document.createElement('button');
  btn.className = 'dojo-tab' + (i === 0 ? ' is-active' : '');
  btn.textContent = p.dojo.replace('Dojo de ', '');
  btn.dataset.index = i;
  planningTabs.appendChild(btn);

  // Panel : grille de cartes
  const panel = document.createElement('div');
  panel.className = 'dojo-panel' + (i === 0 ? ' is-active' : '');
  panel.dataset.index = i;

  const grid = document.createElement('div');
  grid.className = 'planning-grid';

  (p.cours || []).forEach(c => {
    const card = document.createElement('div');
    card.className = 'planning-card';
    card.innerHTML = `
      <div class="planning-card__belt" style="background:${esc(c.belt)}"></div>
      <div class="planning-card__age">${esc(c.age)}</div>
      <div class="planning-card__name">${esc(c.name)}</div>
      <div class="planning-card__days">${esc(c.days)}</div>
      <div class="planning-card__time">${esc(c.time)}</div>`;
    grid.appendChild(card);
  });

  panel.appendChild(grid);
  planningPanels.appendChild(panel);
});

planningTabs.addEventListener('click', e => {
  const btn = e.target.closest('.dojo-tab');
  if (!btn) return;
  planningTabs.querySelectorAll('.dojo-tab').forEach(b => b.classList.remove('is-active'));
  planningPanels.querySelectorAll('.dojo-panel').forEach(p => p.classList.remove('is-active'));
  btn.classList.add('is-active');
  planningPanels.querySelector(`[data-index="${btn.dataset.index}"]`).classList.add('is-active');
});


// Textes dynamiques
const tx = applyPageTextes('cours');
setT('co-hero-eyebrow', tx.heroEyebrow);
setLines('co-hero-l', tx.heroTitre);
setT('co-s1-eyebrow', tx.s1Eyebrow); setH('co-s1-titre', tx.s1Titre); setT('co-s1-lede', tx.s1Lede);
setT('co-s2-eyebrow', tx.s2Eyebrow); setH('co-s2-titre', tx.s2Titre); setT('co-s2-lede', tx.s2Lede);
setT('co-s3-eyebrow', tx.s3Eyebrow); setH('co-s3-titre', tx.s3Titre);
setT('co-cta-titre', tx.ctaTitre); setT('co-cta-sub', tx.ctaSub);
initScrollReveal();
}); // fin initData
</script>
</body>
</html>
